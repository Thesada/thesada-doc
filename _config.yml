title: "Thesada"
description: "Open-source ESP32 property monitoring platform. Custom C++ firmware with MQTT, TLS, cellular fallback, battery monitoring, and Home Assistant integration. Built for rural and off-grid deployments."
url: "https://thesada.io"
baseurl: ""

social:
  name: Thesada
  links:
    - https://github.com/Thesada
    - https://youtube.com/@FoothillsBuilds

theme: just-the-docs

plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-remote-theme

search_enabled: true
heading_anchors: true

color_scheme: dark
mermaid:
  version: "10.9.0"
nav_sort: case_insensitive

footer_content: "Thesada - GPL-3.0-only (firmware) / CC BY-NC-SA 4.0 (docs) - <a href='/legal/license/'>License</a>"
favicon_ico: "/assets/img/favicon.svg"

aux_links:
  "GitHub":
    - "https://github.com/Thesada"
  "YouTube":
    - "https://youtube.com/@FoothillsBuilds"

aux_links_new_tab: true

defaults:
  - scope:
      path: ""
    values:
      layout: default